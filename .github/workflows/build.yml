name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Generate version tag
        id: version
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y.%m.%d')
          TAG="v${DATE}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      - name: Inject version into updater.py
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $content = Get-Content updater.py -Raw
          $content = $content -replace 'CURRENT_VERSION\s*=\s*"[^"]*"', "CURRENT_VERSION = `"$tag`""
          Set-Content updater.py $content -NoNewline

      - name: Install dependencies
        run: pip install obd pyserial pyinstaller --upgrade --quiet

      - name: Build app (onedir)
        shell: pwsh
        run: |
          pyinstaller --onedir --windowed --name "OBD2_Diagnostics" --add-data "updater.py;." car_diagnostics_gui.py

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=$tag installer.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "OBD2 Diagnostics ${{ steps.version.outputs.tag }}"
          body: "Автосборка из коммита ${{ github.sha }}\n\n${{ github.event.head_commit.message }}"
          files: Output/OBD2_Diagnostics_Setup.exe
          make_latest: true
